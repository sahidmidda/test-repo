<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Travel Form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <img src="su.jpg" alt="Sarvajanik University" class="bg" />
    <div class="container">
      <h1>Welcome to SRKI Annual College Trip</h1>
      <p>Enter your details below to confirm your participation in the trip</p>

      <p class="submitMsg">
        Thanks for submitting the form. We're happy to see you join us!!
      </p>

      <form action="submit.php" method="post">
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Enter your name"
        />
        <input type="text" name="age" id="age" placeholder="Enter your Age" />
        <input
          type="text"
          name="gender"
          id="gender"
          placeholder="Enter your gender"
        />
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your email"
        />
        <input
          type="phone"
          name="phone"
          id="phone"
          placeholder="Enter your phone"
        />
        <textarea
          name="other"
          id="other"
          cols="30"
          rows="10"
          placeholder="Enter any other info."
        ></textarea>
        <button class="btn" name="submit" id="submit">Submit</button>
      </form>
    </div>
    <script src="index.js"></script>
  </body>
</html>
